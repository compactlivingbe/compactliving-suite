name: All-Spark monthly snapshot

on:
  schedule:
    - cron: "0 3 1 * *"   # 1e van de maand 03:00 UTC (vóór de Top Systems-run)
  workflow_dispatch:
    inputs:
      no_categories:
        description: "Categorie/merk-mapping overslaan (sneller)"
        type: boolean
        default: false
      max_pages:
        description: "Max hoofdlijst-pagina's (leeg = alles; testmodus bv. 5)"
        required: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install cloudscraper beautifulsoup4 requests

      - name: Scrape All-Spark → snapshot
        run: |
          mkdir -p logs
          ARGS=""
          if [ "${{ github.event.inputs.no_categories }}" == "true" ]; then
            ARGS="$ARGS --no-categories"
          fi
          if [ -n "${{ github.event.inputs.max_pages }}" ]; then
            ARGS="$ARGS --max-pages ${{ github.event.inputs.max_pages }}"
          fi
          python -X utf8 lib/allspark_sync.py $ARGS 2>&1 | tee logs/allspark_$(date +%Y-%m-%d).log

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/allspark_snapshot.json
          git diff --cached --quiet && echo "Geen wijzigingen in snapshot." && exit 0
          git commit -m "All-Spark snapshot (cron) $(date +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "push poging $i faalde, 5s wachten..."; sleep 5
          done
          echo "push faalde na 3 pogingen"; exit 1

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allspark-${{ github.run_number }}
          path: logs/
          retention-days: 90
